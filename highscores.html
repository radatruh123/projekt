<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders – Highscores</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap');
    :root {
      --bg: #f4f0ea; --text: #000; --primary: #ff3366; --accent: #ffde00; --secondary: #00c4b5;
      --border: 4px solid #000; --shadow: 8px 8px 0px #000; --shadow-hover: 12px 12px 0px #000;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; overflow-x: hidden; }

    /* BOČNÍ NAVIGACE */
    .sidebar { width: 280px; background: var(--secondary); border-right: var(--border); display: flex; flex-direction: column; padding: 2rem; position: sticky; top: 0; height: 100vh; z-index: 10; }
    .nav-logo { font-family: var(--font-head); font-size: 3.5rem; line-height: 0.9; color: var(--text); text-decoration: none; margin-bottom: 3rem; text-transform: uppercase; }
    .nav-links { list-style: none; display: flex; flex-direction: column; gap: 1rem; flex-grow: 1; }
    .nav-links a { font-family: var(--font-head); font-size: 1.8rem; color: var(--text); text-decoration: none; padding: 0.5rem 1rem; border: var(--border); background: #fff; box-shadow: 4px 4px 0px #000; transition: 0.1s; display: block; text-align: center; }
    .nav-links a:hover, .nav-links a.active { background: var(--primary); color: #fff; transform: translate(-2px, -2px); box-shadow: 6px 6px 0px #000; }
    .nav-user { margin-top: auto; padding: 1rem; background: #fff; border: var(--border); box-shadow: 4px 4px 0px #000; display: none; flex-direction: column; gap: 0.5rem; text-align: center; }
    .nav-user span { font-weight: 700; font-size: 1.2rem; }
    .nav-user button { background: var(--text); color: #fff; border: none; padding: 0.5rem; font-family: var(--font-body); font-weight: 700; cursor: pointer; text-transform: uppercase; }
    .nav-user button:hover { background: var(--primary); }

    /* OBSAH */
    .main-content { flex: 1; padding: 3rem; max-width: 1000px; }
    .header-block { background: var(--accent); border: var(--border); box-shadow: var(--shadow); padding: 3rem; margin-bottom: 3rem; transform: rotate(-1deg); }
    .header-block h1 { font-family: var(--font-head); font-size: 6rem; line-height: 1; text-transform: uppercase; }
    .header-block p { font-size: 1.2rem; font-weight: 700; margin-top: 1rem; }

    .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-weight: 700; border-bottom: 4px solid #000; padding-bottom: 1rem; }
    .btn { font-family: var(--font-head); font-size: 1.5rem; padding: 0.5rem 1.5rem; border: var(--border); background: #fff; color: #000; cursor: pointer; box-shadow: 4px 4px 0px #000; text-transform: uppercase; transition: 0.1s;}
    .btn:hover { background: var(--primary); color: #fff; transform: translate(-2px,-2px); box-shadow: 6px 6px 0px #000; }

    .table-wrap { border: var(--border); background: #fff; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--text); color: #fff; font-family: var(--font-head); font-size: 1.5rem; }
    th { padding: 1.2rem; text-align: left; }
    td { padding: 1.2rem; border-bottom: 2px solid #000; font-weight: 600; font-size: 1.2rem; }
    tr:last-child td { border-bottom: none; }
    tr:nth-child(even) { background: #f9f9f9; }
    tr.mine td { background: var(--accent); }
    tr.mine td:nth-child(2)::after { content: ' (TY)'; color: var(--primary); font-family: var(--font-head); font-size: 1.5rem; margin-left: 0.5rem; }

    .top-1 td { background: var(--primary); color: #fff; font-size: 1.5rem; }
    .top-1 td.score-v { color: var(--accent); text-shadow: 2px 2px 0 #000; }
    .top-2 td { background: #e0e0e0; }
    .top-3 td { background: #d4a373; color: #000; }

    .score-v { font-family: var(--font-head); font-size: 2rem; color: var(--primary); }

    @media(max-width: 900px) {
      body { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: var(--border); padding: 1rem; flex-direction: row; flex-wrap: wrap; justify-content: space-between; align-items: center; }
      .nav-logo { margin-bottom: 0; font-size: 2.5rem; }
      .nav-links { flex-direction: row; gap: 0.5rem; width: 100%; margin-top: 1rem; }
      .nav-links a { font-size: 1.2rem; flex: 1; }
      .main-content { padding: 1.5rem; }
      .header-block h1 { font-size: 3.5rem; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <a class="nav-logo" href="index.html">SPACE<br>INVADERS</a>
  <ul class="nav-links">
    <li><a href="index.html">Menu</a></li>
    <li><a href="highscores.html" class="active">Žebříček</a></li>
    <li><a href="login.html" id="nlLogin">Login</a></li>
    <li><a href="register.html" id="nlRegister">Registrace</a></li>
  </ul>
  <div class="nav-user" id="navUser">
    <span>PILOT:</span>
    <span id="navName" style="color: var(--primary); font-family: var(--font-head); font-size:2rem;"></span>
    <button onclick="logout()">EJECT</button>
  </div>
</aside>

<main class="main-content">
  <div class="header-block">
    <h1>Síň Slávy</h1>
    <p>Tady končí legrace. Pouze tvé absolutní maximum.</p>
  </div>

  <div class="toolbar">
    <span id="count" style="font-size: 1.2rem; text-transform: uppercase;"></span>
    <div style="display:flex; gap: 1rem; align-items: center;">
      <span id="updated" style="font-size: 0.9rem;"></span>
      <button class="btn" onclick="loadHS()">Aktualizovat</button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead><tr><th>Rank</th><th>Hráč</th><th>Skóre</th><th>Čas (s)</th><th>Datum</th></tr></thead>
      <tbody id="hsBody"><tr><td colspan="5" style="text-align:center; padding: 3rem;">Načítám data ze sítě...</td></tr></tbody>
    </table>
  </div>
</main>

<script>
  function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
  function getSession(){ return localStorage.getItem('si_session')||null }
  function logout(){ localStorage.removeItem('si_session'); location.reload() }

  function initNav(){
    const s=getSession(); if(!s) return;
    const users=JSON.parse(localStorage.getItem('si_users')||'{}');
    if(!users[s]) return;
    document.getElementById('navUser').style.display='flex';
    document.getElementById('navName').textContent=s;
    document.getElementById('nlLogin').style.display='none';
    document.getElementById('nlRegister').style.display='none';
  }

  function dedup(list){
    const map={};
    for(const e of list){
      const n=(e.name||e.username||'').toLowerCase();
      if(!map[n]||e.score>map[n].score) map[n]=e;
    }
    return Object.values(map).sort((a,b)=>b.score-a.score);
  }

  async function loadHS(){
    try{
      const r=await fetch('highscores.json?t='+Date.now());
      const data=await r.json();
      const rows=dedup(data.highscores||[]);
      const session=getSession();

      document.getElementById('count').textContent=rows.length?`Počet záznamů: ${rows.length}`:'';
      document.getElementById('updated').textContent='Sync: '+new Date().toLocaleTimeString('cs-CZ');

      const b=document.getElementById('hsBody');
      if(!rows.length){b.innerHTML='<tr><td colspan="5" style="text-align:center;">Prázdno.</td></tr>';return}

      b.innerHTML=rows.map((e,i)=>{
        const name=e.name||e.username||'?';
        const isMine=session&&name.toLowerCase()===session.toLowerCase();
        let rankClass = '';
        if(i===0) rankClass = 'top-1';
        else if(i===1) rankClass = 'top-2';
        else if(i===2) rankClass = 'top-3';

        return `<tr class="${isMine?'mine':''} ${rankClass}">
          <td style="font-family:var(--font-head); font-size:1.8rem;">#${i+1}</td>
          <td style="text-transform:uppercase;">${esc(name)}</td>
          <td class="score-v">${e.score}</td>
          <td>${e.time}</td>
          <td style="font-size:0.9rem;">${e.date||''}</td>
        </tr>`}).join('');
    }catch{
      document.getElementById('hsBody').innerHTML='<tr><td colspan="5" style="text-align:center; color:red;">[ERROR] Spojení přerušeno.</td></tr>';
    }
  }

  initNav(); loadHS(); setInterval(loadHS,10000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders – Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap');
    :root {
      --bg: #fff; --text: #000; --primary: #ff3366; --accent: #ffde00; --secondary: #00c4b5;
      --border: 4px solid #000; --shadow: 8px 8px 0px #000;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ZDE JE NEJVĚTŠÍ ZMĚNA: Split screen místo malé krabičky */
    body { font-family: var(--font-body); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    .split-left {
      flex: 1; background: var(--primary); border-right: var(--border);
      display: flex; flex-direction: column; justify-content: center; padding: 4rem;
      position: relative; overflow: hidden;
    }
    .split-left h1 { font-family: var(--font-head); font-size: clamp(5rem, 8vw, 10rem); line-height: 0.8; color: #000; text-transform: uppercase; z-index: 2; }
    .split-left .bg-text { position: absolute; font-family: var(--font-head); font-size: 30vw; color: rgba(0,0,0,0.1); transform: rotate(-10deg); top: -10%; left: -10%; pointer-events: none; z-index: 1;}

    .split-right {
      flex: 1; background: var(--bg); display: flex; flex-direction: column; padding: 2rem; position: relative;
    }

    .top-nav { display: flex; gap: 1rem; justify-content: flex-end; margin-bottom: auto; }
    .top-nav a { font-family: var(--font-head); font-size: 1.5rem; text-decoration: none; color: #000; border: 2px solid #000; padding: 0.5rem 1rem; transition: 0.1s; text-transform: uppercase; }
    .top-nav a:hover { background: var(--accent); transform: translate(-2px,-2px); box-shadow: 4px 4px 0px #000; }

    .form-box { width: 100%; max-width: 450px; margin: auto; }
    .form-box h2 { font-family: var(--font-head); font-size: 4rem; margin-bottom: 0.5rem; text-transform: uppercase; line-height: 1; }
    .form-box p { font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; border-left: 4px solid var(--primary); padding-left: 1rem; }

    .fg { margin-bottom: 1.5rem; }
    .fg label { display: block; font-family: var(--font-head); font-size: 1.8rem; margin-bottom: 0.5rem; text-transform: uppercase; }
    .fg input { width: 100%; padding: 1rem; border: var(--border); background: #f9f9f9; font-family: var(--font-body); font-size: 1.2rem; font-weight: 600; outline: none; transition: 0.1s; }
    .fg input:focus { background: #fff; box-shadow: 6px 6px 0px var(--accent); transform: translate(-2px,-2px); }

    .alert { padding: 1rem; border: var(--border); font-weight: 700; margin-bottom: 2rem; display: none; box-shadow: 4px 4px 0px #000; }
    .alert.error { background: var(--primary); color: #fff; }
    .alert.success { background: var(--secondary); color: #000; }
    .alert.show { display: block; }

    .btn-full { width: 100%; padding: 1.2rem; font-family: var(--font-head); font-size: 2rem; border: var(--border); cursor: pointer; background: var(--accent); color: #000; transition: 0.1s; text-transform: uppercase; margin-top: 1rem; }
    .btn-full:hover { background: var(--text); color: #fff; transform: translate(-4px,-4px); box-shadow: var(--shadow); }
    .btn-full:disabled { opacity: 0.5; pointer-events: none; }

    @media(max-width: 900px) { body { flex-direction: column; } .split-left { padding: 2rem; border-right: none; border-bottom: var(--border); flex: none; height: 30vh; } .split-left h1 { font-size: 4rem; } }
  </style>
</head>
<body>

<div class="split-left">
  <div class="bg-text">PLAY</div>
  <h1>Vítej<br>Zpět.</h1>
</div>

<div class="split-right">
  <div class="top-nav">
    <a href="index.html">Zpět na web</a>
    <a href="register.html" style="background:var(--secondary);">Registrace</a>
  </div>

  <div class="form-box">
    <h2>Login</h2>
    <p>Zadej údaje a naskoč do kokpitu.</p>

    <div class="alert error" id="err"></div>
    <div class="alert success" id="ok"></div>

    <div class="fg">
      <label>Přezdívka</label>
      <input type="text" id="username" autocomplete="username">
    </div>
    <div class="fg">
      <label>Heslo</label>
      <input type="password" id="password" autocomplete="current-password">
    </div>

    <button class="btn-full" id="btn" onclick="doLogin()">Start Game</button>
  </div>
</div>

<script>
  if(localStorage.getItem('si_session')) location.href='index.html';
  document.addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin(); });

  function showErr(msg){ const e=document.getElementById('err'); e.textContent='ERR: '+msg; e.classList.add('show'); document.getElementById('ok').classList.remove('show'); }
  function showOk(msg) { const e=document.getElementById('ok');  e.textContent='OK: '+msg; e.classList.add('show'); document.getElementById('err').classList.remove('show'); }

  function doLogin(){
    const btn=document.getElementById('btn'); const user=document.getElementById('username').value.trim(); const pass=document.getElementById('password').value;
    if(!user||!pass){ showErr('Vyplň všechno.'); return; }
    btn.disabled=true; btn.textContent='ČEKÁM...';

    setTimeout(()=>{
      const users = JSON.parse(localStorage.getItem('si_users')||'{}');
      if(!users[user] || users[user].password !== simpleHash(pass)){
        showErr('Špatné jméno nebo heslo.'); btn.disabled=false; btn.textContent='START GAME'; return;
      }
      localStorage.setItem('si_session', user);
      showOk('Přihlášeno. Nabíhám...');
      setTimeout(()=> location.href='index.html', 800);
    }, 400);
  }

  function simpleHash(str){
    let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i);
    return (h>>>0).toString(36);
  }
</script>
</body>
</html>

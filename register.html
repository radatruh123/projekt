<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders – Registrace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;600;700&display=swap');
    :root {
      --bg: #fff; --text: #000; --primary: #ff3366; --accent: #ffde00; --secondary: #00c4b5;
      --border: 4px solid #000; --shadow: 8px 8px 0px #000;
      --font-head: 'Bebas Neue', sans-serif; --font-body: 'Space Grotesk', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: var(--font-body); background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

    /* Opačné rozložení než u Loginu */
    .split-left {
      flex: 1; background: var(--bg); display: flex; flex-direction: column; padding: 2rem; position: relative;
    }

    .split-right {
      flex: 1; background: var(--secondary); border-left: var(--border);
      display: flex; flex-direction: column; justify-content: center; padding: 4rem;
      position: relative; overflow: hidden; text-align: right;
    }
    .split-right h1 { font-family: var(--font-head); font-size: clamp(5rem, 8vw, 10rem); line-height: 0.8; color: #000; text-transform: uppercase; z-index: 2; }
    .split-right .bg-text { position: absolute; font-family: var(--font-head); font-size: 30vw; color: rgba(0,0,0,0.1); transform: rotate(10deg); top: -10%; right: -10%; pointer-events: none; z-index: 1;}

    .top-nav { display: flex; gap: 1rem; margin-bottom: auto; }
    .top-nav a { font-family: var(--font-head); font-size: 1.5rem; text-decoration: none; color: #000; border: 2px solid #000; padding: 0.5rem 1rem; transition: 0.1s; text-transform: uppercase; }
    .top-nav a:hover { background: var(--accent); transform: translate(-2px,-2px); box-shadow: 4px 4px 0px #000; }

    .form-box { width: 100%; max-width: 450px; margin: auto; }
    .form-box h2 { font-family: var(--font-head); font-size: 4rem; margin-bottom: 0.5rem; text-transform: uppercase; line-height: 1; }
    .form-box p { font-size: 1.2rem; font-weight: 600; margin-bottom: 2rem; border-left: 4px solid var(--secondary); padding-left: 1rem; }

    .fg { margin-bottom: 1.2rem; }
    .fg label { display: block; font-family: var(--font-head); font-size: 1.5rem; margin-bottom: 0.3rem; text-transform: uppercase; }
    .fg input { width: 100%; padding: 0.8rem; border: var(--border); background: #f9f9f9; font-family: var(--font-body); font-size: 1.1rem; font-weight: 600; outline: none; transition: 0.1s; }
    .fg input:focus { background: #fff; box-shadow: 4px 4px 0px var(--primary); transform: translate(-2px,-2px); }
    .fg input.bad { border-color: red; }
    .fg input.ok { border-color: #00c4b5; }

    .strength-bar { height: 8px; border: 2px solid #000; background: #fff; margin-top: 0.5rem; }
    .strength-fill { height: 100%; width: 0; background: var(--text); transition: 0.2s; }

    .alert { padding: 1rem; border: var(--border); font-weight: 700; margin-bottom: 1rem; display: none; box-shadow: 4px 4px 0px #000; }
    .alert.error { background: var(--primary); color: #fff; }
    .alert.success { background: var(--accent); color: #000; }
    .alert.show { display: block; }

    .btn-full { width: 100%; padding: 1.2rem; font-family: var(--font-head); font-size: 2rem; border: var(--border); cursor: pointer; background: var(--text); color: #fff; transition: 0.1s; text-transform: uppercase; margin-top: 1rem; }
    .btn-full:hover { background: var(--primary); transform: translate(-4px,-4px); box-shadow: var(--shadow); }
    .btn-full:disabled { opacity: 0.5; pointer-events: none; }

    @media(max-width: 900px) { body { flex-direction: column-reverse; } .split-right { padding: 2rem; border-left: none; border-bottom: var(--border); flex: none; height: 30vh; text-align: left;} .split-right h1 { font-size: 4rem; } }
  </style>
</head>
<body>

<div class="split-left">
  <div class="top-nav">
    <a href="index.html">Zpět</a>
    <a href="login.html" style="background:var(--primary); color:#fff;">Login</a>
  </div>

  <div class="form-box">
    <h2>Registrace</h2>
    <p>Vytvoř si profil a zapiš se do žebříčku.</p>

    <div class="alert error" id="err"></div>
    <div class="alert success" id="ok"></div>

    <div class="fg">
      <label>Přezdívka (2-20 znaků)</label>
      <input type="text" id="username" maxlength="20" autocomplete="username" oninput="valUser(this)">
    </div>

    <div class="fg">
      <label>Heslo (Min 4 znaky)</label>
      <input type="password" id="password" autocomplete="new-password" oninput="checkStrength(this.value)">
      <div class="strength-bar"><div class="strength-fill" id="sfill"></div></div>
    </div>

    <div class="fg">
      <label>Heslo znovu</label>
      <input type="password" id="password2" autocomplete="new-password" oninput="valMatch()">
    </div>

    <button class="btn-full" id="btn" onclick="doRegister()">Vytvořit účet</button>
  </div>
</div>

<div class="split-right">
  <div class="bg-text">NEW</div>
  <h1>Nový<br>Hráč.</h1>
</div>

<script>
  if(localStorage.getItem('si_session')) location.href='index.html';
  document.addEventListener('keydown', e=>{ if(e.key==='Enter') doRegister(); });

  function valUser(input){ const v=input.value.trim(); input.className = v.length>=2&&v.length<=20 ? 'ok' : v.length?'bad':''; }
  function checkStrength(pw){
    const fill=document.getElementById('sfill'); let s=0;
    if(pw.length>=4) s++; if(pw.length>=8) s++; if(/[A-Z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^a-zA-Z0-9]/.test(pw)) s++;
    fill.style.width = ['0','20%','40%','60%','80%','100%'][s];
    fill.style.background = ['#fff','#ff3366','#ffde00','#00c4b5','#000','#000'][s];
  }
  function valMatch(){ const p2=document.getElementById('password2'); const p1=document.getElementById('password').value; p2.className=p2.value?(p2.value===p1?'ok':'bad'):''; }

  function showErr(msg){ const e=document.getElementById('err'); e.textContent='ERR: '+msg; e.classList.add('show'); document.getElementById('ok').classList.remove('show'); }
  function showOk(msg) { const e=document.getElementById('ok');  e.textContent='OK: '+msg; e.classList.add('show'); document.getElementById('err').classList.remove('show'); }

  function simpleHash(str){ let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h)^str.charCodeAt(i); return (h>>>0).toString(36); }

  function doRegister(){
    const btn=document.getElementById('btn'); const user=document.getElementById('username').value.trim(); const pass=document.getElementById('password').value; const pass2=document.getElementById('password2').value;
    if(!user||!pass) { showErr('Musíš vyplnit všechno.'); return; }
    if(user.length<2||user.length>20) { showErr('Jméno musí mít 2-20 znaků.'); return; }
    if(pass.length<4) { showErr('Heslo je moc krátké.'); return; }
    if(pass!==pass2) { showErr('Hesla se neshodují.'); return; }

    btn.disabled=true; btn.textContent='ZAPISUJI...';

    setTimeout(()=>{
      const users=JSON.parse(localStorage.getItem('si_users')||'{}');
      if(users[user]){ showErr('Jméno už někdo má.'); btn.disabled=false; btn.textContent='VYTVOŘIT ÚČET'; return; }

      users[user]={ password: simpleHash(pass), created: new Date().toLocaleString('cs-CZ') };
      localStorage.setItem('si_users', JSON.stringify(users));
      localStorage.setItem('si_session', user);

      showOk('Hotovo. Jde se na to...');
      setTimeout(()=> location.href='index.html', 900);
    }, 400);
  }
</script>
</body>
</html>
